<!DOCTYPE html>
<html>
<head>
  <title>Messenger</title>
</head>
<body>

<h2>🔥 Messenger</h2>

<div id="auth">
  <input id="email" placeholder="email">
  <input id="password" type="password" placeholder="password">
  <button onclick="register()">Регистрация</button>
  <button onclick="login()">Вход</button>
</div>

<div id="chatUI" style="display:none;">
  <h3 id="user"></h3>

  <input id="msg" placeholder="Сообщение">
  <button onclick="send()">Отправить</button>

  <div id="chat"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// ✅ ТВОЙ CONFIG УЖЕ ВСТАВЛЕН
const firebaseConfig = {
  apiKey: "AIzaSyC4L0ofr9cxc7QFVjkCKnNjoSfm3GXglSA",
  authDomain: "m-f8447.firebaseapp.com",
  databaseURL: "https://m-f8447-default-rtdb.firebaseio.com",
  projectId: "m-f8447",
  storageBucket: "m-f8447.firebasestorage.app",
  messagingSenderId: "368502901572",
  appId: "1:368502901572:web:e3e8bccf8f40505681e511",
  measurementId: "G-80JBYRXTSB"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// элементы
const authDiv = document.getElementById("auth");
const chatUI = document.getElementById("chatUI");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const msgInput = document.getElementById("msg");
const chatDiv = document.getElementById("chat");

// регистрация
window.register = async () => {
  try {
    await createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
    alert("Аккаунт создан");
  } catch (e) {
    alert(e.message);
  }
};

// вход
window.login = async () => {
  try {
    await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
    alert("Вход выполнен");
  } catch (e) {
    alert(e.message);
  }
};

// отправка сообщений
window.send = async () => {
  if (!msgInput.value) return;

  await addDoc(collection(db, "messages"), {
    text: msgInput.value,
    user: auth.currentUser.email,
    time: Date.now()
  });

  msgInput.value = "";
};

// отслеживание входа
onAuthStateChanged(auth, (user) => {
  if (user) {
    authDiv.style.display = "none";
    chatUI.style.display = "block";

    document.getElementById("user").innerText = user.email;

    const q = query(collection(db, "messages"), orderBy("time"));

    onSnapshot(q, (snapshot) => {
      chatDiv.innerHTML = "";

      snapshot.forEach(doc => {
        const data = doc.data();

        const div = document.createElement("div");
        div.innerText = data.user + ": " + data.text;

        chatDiv.appendChild(div);
      });
    });
  }
});
</script>

</body>
</html>
